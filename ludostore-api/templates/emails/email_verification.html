<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Verify Your Email</title>
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
                Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
        "
    >
        <table
            width="100%"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="background-color: #f5f5f5"
        >
            <tr>
                <td align="center" style="padding: 40px 20px">
                    <table
                        width="100%"
                        max-width="600px"
                        cellpadding="0"
                        cellspacing="0"
                        border="0"
                        style="
                            max-width: 600px;
                            width: 100%;
                            background-color: #ffffff;
                            border-radius: 12px;
                            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
                        "
                    >
                        <tr>
                            <td style="padding: 32px 32px 0 32px">
                                <h1
                                    style="
                                        margin: 0;
                                        font-size: 24px;
                                        font-weight: 600;
                                        color: #000000;
                                    "
                                >
                                    Verify Your Email
                                </h1>
                            </td>
                        </tr>
                        <tr>
                            <td style="padding: 24px 32px">
                                <p
                                    style="
                                        margin: 0 0 16px 0;
                                        font-size: 16px;
                                        line-height: 1.5;
                                        color: #000000;
                                    "
                                >
                                    Hello {{ user_name }},
                                </p>
                                <p
                                    style="
                                        margin: 0 0 24px 0;
                                        font-size: 16px;
                                        line-height: 1.5;
                                        color: #000000;
                                    "
                                >
                                    Click the button below to verify your email
                                    address:
                                </p>
                                <div style="text-align: center; margin: 32px 0">
                                    <a
                                        href="{{ verification_url }}"
                                        style="
                                            display: inline-block;
                                            background-color: #000000;
                                            color: #ffffff;
                                            text-decoration: none;
                                            padding: 14px 32px;
                                            border-radius: 8px;
                                            font-size: 16px;
                                            font-weight: 600;
                                        "
                                        >Verify Email Address</a
                                    >
                                </div>
                                <p
                                    style="
                                        margin: 0 0 16px 0;
                                        font-size: 14px;
                                        line-height: 1.5;
                                        color: #666666;
                                    "
                                >
                                    Or copy this link: {{ verification_url }}
                                </p>
                                <p
                                    style="
                                        margin: 0 0 16px 0;
                                        font-size: 14px;
                                        line-height: 1.5;
                                        color: #666666;
                                    "
                                >
                                    This link expires in {{ expiry_hours }}
                                    hours.
                                </p>
                            </td>
                        </tr>
                        <tr>
                            <td
                                style="
                                    padding: 24px 32px 32px 32px;
                                    border-top: 1px solid #e9ecef;
                                "
                            >
                                <p
                                    style="
                                        margin: 0;
                                        font-size: 12px;
                                        color: #999999;
                                    "
                                >
                                    &copy; 2026 LudoStore. All rights reserved.
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
